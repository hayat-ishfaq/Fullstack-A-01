<svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
    <circle cx="25" cy="25" r="20" fill="none" stroke="#DC2626" stroke-width="4" opacity="0.2"/>
    <circle cx="25" cy="25" r="20" fill="none" stroke="#DC2626" stroke-width="4" stroke-dasharray="90 30" stroke-linecap="round">
        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 25 25"
            to="360 25 25"
            dur="1s"
            repeatCount="indefinite"/>
    </circle>
