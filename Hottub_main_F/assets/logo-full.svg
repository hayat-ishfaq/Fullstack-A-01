<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F3F4F6"/>
  
  <!-- Hot tub body -->
  <rect x="40" y="80" width="120" height="70" rx="10" fill="url(#logoGrad)"/>
  <rect x="45" y="75" width="110" height="10" rx="5" fill="#7F1D1D"/>
  
  <!-- Water surface -->
  <ellipse cx="100" cy="85" rx="50" ry="8" fill="url(#waterGrad)"/>
  
  <!-- Bubbles (animated) -->
  <circle cx="70" cy="95" r="3" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="95;75;95" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="85" cy="100" r="2.5" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="100;80;100" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="98" r="3.5" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="98;78;98" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="115" cy="100" r="2" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="100;80;100" dur="1.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="95" r="3" fill="#FFF" opacity="0.8">
    <animate attributeName="cy" values="95;75;95" dur="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Steps -->
  <rect x="145" y="110" width="30" height="15" fill="#7F1D1D"/>
  <rect x="150" y="125" width="30" height="15" fill="#991B1B"/>
  <rect x="155" y="140" width="30" height="10" fill="#B91C1C"/>
  
  <!-- Steam effect -->
  <path d="M 60 70 Q 65 65 70 70" stroke="#9CA3AF" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 90 68 Q 95 63 100 68" stroke="#9CA3AF" stroke-width="2" fill="none" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 120 70 Q 125 65 130 70" stroke="#9CA3AF" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.8s" repeatCount="indefinite"/>
  </path>
  
  <!-- Brand text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#DC2626" text-anchor="middle">HOTSPRING</text>
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Portable Spas</text>
</svg>
