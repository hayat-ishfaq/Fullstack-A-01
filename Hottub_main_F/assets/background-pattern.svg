<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="bgPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Spa/Water themed pattern -->
      
      <!-- Circular ripples -->
      <circle cx="50" cy="50" r="30" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.1"/>
      <circle cx="50" cy="50" r="20" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.15"/>
      <circle cx="50" cy="50" r="10" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.2"/>
      
      <!-- Smaller ripples in corners -->
      <circle cx="0" cy="0" r="15" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.1"/>
      <circle cx="100" cy="0" r="15" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.1"/>
      <circle cx="0" cy="100" r="15" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.1"/>
      <circle cx="100" cy="100" r="15" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.1"/>
      
      <!-- Bubbles -->
      <circle cx="25" cy="75" r="3" fill="#60A5FA" opacity="0.08"/>
      <circle cx="75" cy="25" r="2.5" fill="#60A5FA" opacity="0.08"/>
      <circle cx="15" cy="35" r="2" fill="#60A5FA" opacity="0.08"/>
      <circle cx="85" cy="65" r="2" fill="#60A5FA" opacity="0.08"/>
      
      <!-- Decorative lines -->
      <path d="M 20 80 Q 30 75 40 80" stroke="#DC2626" stroke-width="0.5" fill="none" opacity="0.05"/>
      <path d="M 60 20 Q 70 15 80 20" stroke="#DC2626" stroke-width="0.5" fill="none" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Apply pattern -->
  <rect width="400" height="400" fill="url(#bgPattern)"/>
</svg>
