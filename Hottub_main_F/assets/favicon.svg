<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#faviconGrad)"/>
  
  <!-- Hot tub icon -->
  <rect x="6" y="14" width="20" height="12" rx="2" fill="#FFF" opacity="0.9"/>
  <rect x="7" y="12" width="18" height="2" rx="1" fill="#FFF" opacity="0.8"/>
  
  <!-- Water bubbles -->
  <circle cx="12" cy="16" r="1.5" fill="#60A5FA" opacity="0.7">
    <animate attributeName="cy" values="16;12;16" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="18" r="1" fill="#60A5FA" opacity="0.7">
    <animate attributeName="cy" values="18;14;18" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="17" r="1.2" fill="#60A5FA" opacity="0.7">
    <animate attributeName="cy" values="17;13;17" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
