<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#successGrad)">
    <animate attributeName="r" values="0;45" dur="0.5s" fill="freeze"/>
  </circle>
  
  <!-- Checkmark -->
  <path d="M 25 50 L 40 65 L 75 30" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" from="0,100" to="100,0" dur="0.6s" begin="0.3s" fill="freeze"/>
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.6s" begin="0.3s" fill="freeze"/>
  </path>
</svg>
