<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="spinnerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EF4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Spinning circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#spinnerGrad)" stroke-width="8" stroke-linecap="round">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="1s"
      repeatCount="indefinite"/>
  </circle>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#DC2626">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
