<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Lock Body -->
    <rect x="30" y="50" width="40" height="35" rx="5" fill="#DC2626"/>
    <rect x="33" y="53" width="34" height="29" rx="3" fill="#FFF" opacity="0.2"/>
    
    <!-- Lock Shackle -->
    <path d="M 40 50 L 40 35 Q 40 20 50 20 Q 60 20 60 35 L 60 50" 
          stroke="#DC2626" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 40 50 L 40 35 Q 40 23 50 23 Q 60 23 60 35 L 60 50" 
          stroke="#FFF" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.3"/>
    
    <!-- Keyhole -->
    <circle cx="50" cy="65" r="5" fill="#FFF" opacity="0.9"/>
    <rect x="47" y="65" width="6" height="10" fill="#FFF" opacity="0.9"/>
    
    <!-- Key Icon (showing reset) -->
    <g transform="translate(65, 15)" opacity="0.8">
        <circle cx="8" cy="8" r="6" fill="#10B981"/>
        <rect x="12" y="6" width="10" height="4" fill="#10B981"/>
        <rect x="18" y="4" width="2" height="2" fill="#10B981"/>
        <rect x="18" y="8" width="2" height="2" fill="#10B981"/>
    </g>
    
    <!-- Circular Arrow (reset symbol) -->
    <g transform="translate(15, 15)" opacity="0.7">
        <path d="M 10 5 A 5 5 0 1 1 5 10" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 10 5 L 10 8 L 7 5" fill="#3B82F6"/>
    </g>
</svg>
